name: CI/CD

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'

      - uses: actions/cache@v5.0.5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Compute build number
        id: version
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/master" ]; then
            echo "build_number=${{ github.run_number }}" >> $GITHUB_OUTPUT
          else
            echo "build_number=${{ github.run_number }}-SNAPSHOT" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: make build BUILD_NUMBER=${{ steps.version.outputs.build_number }}

      - name: Release
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="1.0-${{ steps.version.outputs.build_number }}"
          JAR=$(find target -name "*.jar" ! -name "*sources*" | head -1)
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          gh release create "v${VERSION}" "${JAR}" \
            --title "Release ${VERSION}" \
            --notes "Build ${{ github.run_number }} · commit ${{ github.sha }}"
